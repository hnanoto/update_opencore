name: Python Application CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests tqdm
        if [ -f update_opencore/requirements.txt ]; then pip install -r update_opencore/requirements.txt; fi
        
    - name: Verify Python Syntax
      run: |
        python -m py_compile update_opencore/*.py
